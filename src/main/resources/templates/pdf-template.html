<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Histórico de Movimentações</title>
    <style>
        @page { size: A4; margin: 20mm; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #333; line-height: 1.4; }
        .header { border-bottom: 2px solid #2ecc71; padding-bottom: 10px; margin-bottom: 20px; }
        .titulo { font-size: 18px; font-weight: bold; color: #000; text-transform: uppercase; }
        .periodo { font-size: 12px; color: #555; margin-top: 5px; }
        .meta-dados { font-size: 10px; color: #888; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #f8f9fa; border-bottom: 2px solid #cbd5e1; color: #475569; text-transform: uppercase; font-size: 10px; font-weight: bold; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #e2e8f0; font-size: 11px; }
        .badge { font-weight: bold; text-transform: uppercase; font-size: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div class="titulo" th:text="${tituloRelatorio}">Histórico de Movimentações do Estoque</div>
    <div class="periodo">
        Período: <span th:text="${dataInicio}">01/01/2026</span> até <span th:text="${dataFim}">31/01/2026</span>
    </div>
    <div class="meta-dados">Gerado automaticamente pelo sistema Gest'On.</div>
</div>

<table>
    <thead>
    <tr>
        <th style="width: 60px;">ID</th>
        <th style="width: 90px;">Tipo</th>
        <th>Motivo da Baixa</th>
        <th style="width: 110px;">Valor Impactado</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="m : ${dados}">
        <td th:text="${'#' + m.id}" style="font-weight: bold; color: #64748b;"></td>
        <td>
            <span th:text="${m.tipo}" class="badge">ENTRADA</span>
        </td>
        <td th:text="${m.motivoBaixa != null and m.motivoBaixa != '' ? m.motivoBaixa : '---'}" style="font-style: italic; color: #555;"></td>
        <td th:text="${m.valorPerdido != null ? 'R$ ' + #numbers.formatDecimal(m.valorPerdido, 1, 'POINT', 2, 'COMMA') : '---'}"></td>
    </tr>
    <tr th:if="${#lists.isEmpty(dados)}">
        <td colspan="4" style="text-align: center; color: #888; padding: 20px;">Nenhum registro encontrado para este período.</td>
    </tr>
    </tbody>
</table>

</body>
</html>
